<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="4leaf.png">

    <style>

            background: linear-gradient(135deg, #0f3d0f, #1f7a1f);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
            font-size: 2.2rem;

        }

            padding: 40px 20px;
            font-size: 1.3rem;
        }

            color: white;

            border-radius: 10px;
