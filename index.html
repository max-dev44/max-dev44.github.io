<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>music.maxgames.org call me max </title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* Full-page setup */
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Press Start 2P', cursive;
    height: 100%;
    overflow-y: scroll;
    background: #0a0a1a;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Animated gradient background */
body::before {
    content: '';
    position: fixed;
    top:0; left:0;
    width: 100%; height: 100%;
    background: linear-gradient(270deg, #1b1b2f, #2e2e3f, #1b1b2f, #2e2e3f);
    background-size: 800% 800%;
    animation: gradientBG 25s ease infinite;
    z-index: -2;
}
@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* Moving particles */
.particles {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:-1;
}
.particle {
    position:absolute;
    width:3px; height:3px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation: float 10s linear infinite;
}
@keyframes float {
    0% {transform: translateY(0px) translateX(0px);}
    100% {transform: translateY(-1200px) translateX(200px);}
}

/* Header */
h1 {
    font-size: 2rem;
    margin: 30px 0;
    text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
    text-align: center;
}

/* Grid container */
.game-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    max-width: 1200px;
    width: 100%;
    justify-items: center;
    padding: 0 20px 50px 20px;
}

/* Buttons */
.game-button {
    width: 100%;
    padding: 15px;
    font-size: 0.9rem;
    background: linear-gradient(45deg, #ff6b6b, #feca57);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #fff;
    text-align: center;
    box-shadow: 0 0 15px #ff6b6b, 0 0 25px #feca57;
    transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
}
.game-button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #feca57, 0 0 40px #ff6b6b;
    background: linear-gradient(45deg, #feca57, #ff6b6b);
}

/* Footer */
footer {
    text-align: center;
    font-size: 0.8rem;
    color: #888;
    margin: 30px 0 20px 0;
}
</style>
</head>
<body>
<h1>music.maxgames.org</h1>

<div class="game-container">
    <button class="game-button" onclick="window.open('#', '_blank')">Game 1</button>
    <button class="game-button" onclick="window.open('#', '_blank')">Game 2</button>
    <button class="game-button" onclick="window.open('#', '_blank')">Game 3</button>
    <button class="game-button" onclick="window.open('#', '_blank')">Game 4</button>
    <button class="game-button" onclick="window.open('#', '_blank')">Game 5</button>
    <button class="game-button" onclick="window.open('#', '_blank')">Game 6</button>
</div>

<footer>
    &copy; 2026 music.maxgames.org
</footer>

<!-- Particles -->
<div class="particles" id="particles"></div>

<script>
// Generate particles
const particleCount = 150;
const particlesContainer = document.getElementById('particles');
for(let i=0;i<particleCount;i++){
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random()*100 + 'vw';
    p.style.top = Math.random()*100 + 'vh';
    p.style.width = (2+Math.random()*3) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (5+Math.random()*15) + 's';
    p.style.opacity = 0.2 + Math.random()*0.5;
    particlesContainer.appendChild(p);
}
</script>
</body>
</html>
