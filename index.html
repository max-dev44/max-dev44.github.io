<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mining RNG Empire: Reforged</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0f;color:#eee}
#top{background:#000;padding:10px;display:flex;gap:18px;flex-wrap:wrap}
#wrap{display:flex}
#side{width:360px;background:#15151c;padding:10px;height:calc(100vh - 52px);overflow:auto}
#main{flex:1;padding:10px}
button{width:100%;margin-top:6px;padding:8px;background:#4caf50;border:none;color:#fff;cursor:pointer}
button:hover{background:#66bb6a}
.card{border:1px solid #333;margin-top:8px;padding:8px}
.locked{opacity:.3}
.legend{border-color:gold}
small{opacity:.7}
</style>
</head>
<body>

<div id="top">
<div>💰 $<span id="money">100</span></div>
<div>⛏ Ore: <span id="ore">0</span></div>
<div>🏭 Refined: <span id="refined">0</span></div>
<div>🌍 World: <span id="world">1</span></div>
<div>✨ Prestige: <span id="prestige">0</span></div>
</div>

<div id="wrap">
<div id="side">
<h3>Mining</h3>
<button onclick="mineOnce()">Mine</button>
<button onclick="superRoll()">SUPER ROLL (CD)</button>
<button onclick="toggleAuto()">Toggle Auto</button>

<h3>Processing</h3>
<button onclick="refine()">Refine (2→1)</button>
<button onclick="sell()">Sell ($10)</button>

<h3>Meta</h3>
<button onclick="prestige()">Prestige Reset</button>

<h3>Upgrades</h3>
<div id="upgrades"></div>
</div>

<div id="main">
<h2>Log</h2>
<div id="log"></div>
</div>
</div>

<script>
let state={
money:100,
ore:0,
refined:0,
auto:false,
world:1,
prestige:0,
owned:new Set(),
multi:1,
superCD:0
};

function worldMult(){return 1 + state.world*0.5 + state.prestige*0.25;}

function getTable(){
let base=[
{name:'Dirt',c:80,v:1},
{name:'Iron',c:10,v:5},
{name:'Gold',c:7,v:10},
{name:'Diamond',c:2,v:80},
{name:'Radium',c:0.5,v:500},
{name:'Uranium',c:0.3,v:1200},
{name:'Plutonium',c:0.15,v:20000},
{name:'Cosmic Shard',c:0.04,v:300000},
{name:'Void Core',c:0.009,v:2000000}
];
for(let t of base){t.c*=worldMult();}
return base;
}

let upgrades=[];
for(let i=0;i<60;i++){
upgrades.push({id:i,tier:Math.floor(i/6),cost:Math.pow(2,i/3)*100,type:i%3,power:1.05+i*0.01,req:i<6?null:i-1});
}

let mineSpeed=600;

function roll(){
let table=getTable();
let r=Math.random()*100,sum=0;
for(let t of table){sum+=t.c;if(r<=sum)return t;}
return table[0];
}

function mineOnce(){
let t=roll();
let gain=t.v*state.multi*worldMult();
state.ore+=gain;
log(`⛏ ${t.name} (+${Math.floor(gain)})`);
checkWorld();
update();
}

function superRoll(){
if(state.superCD>0)return;
state.superCD=10;
for(let i=0;i<20;i++)mineOnce();
}

function toggleAuto(){state.auto=!state.auto;}

function refine(){
let amt=Math.floor(state.ore/2);
state.ore-=amt*2;
state.refined+=amt;
update();
}

function sell(){
state.money+=state.refined*10;
state.refined=0;
update();
}

function prestige(){
if(state.ore<1e6)return;
state.prestige++;
state.money=100;
state.ore=0;
state.refined=0;
state.world=1;
state.owned.clear();
log("🔥 Prestige activated! Permanent boost gained.");
update();
}

function checkWorld(){
let thresholds=[0,1e3,1e5,1e7,1e10,1e13];
for(let i=thresholds.length-1;i>=0;i--){if(state.ore>thresholds[i]){state.world=i+1;break;}}
}

function buy(id){
let u=upgrades[id];
if(state.money<u.cost||state.owned.has(id))return;
if(u.req!==null && !state.owned.has(u.req))return;
state.money-=u.cost;
state.owned.add(id);
if(u.type===0) state.multi*=u.power;
if(u.type===1) state.multi*=u.power;
if(u.type===2) mineSpeed=Math.max(100,mineSpeed/u.power);
update();
}

function renderUpgrades(){
let d=document.getElementById('upgrades');
d.innerHTML='';
for(let u of upgrades){
if(state.owned.has(u.id))continue;
let div=document.createElement('div');
let locked=u.req!==null && !state.owned.has(u.req);
div.className='card '+(locked?'locked':'');
if(u.tier>7)div.classList.add('legend');
div.innerHTML=`U${u.id} T${u.tier}<br>$${Math.floor(u.cost)}`;
if(!locked){let b=document.createElement('button');b.innerText='Buy';b.onclick=()=>buy(u.id);div.appendChild(b);}
d.appendChild(div);
}
}

function log(msg){let el=document.getElementById('log');el.innerHTML=`<div class='card'>${msg}</div>`+el.innerHTML;}

function update(){
document.getElementById('money').innerText=Math.floor(state.money);
document.getElementById('ore').innerText=Math.floor(state.ore);
document.getElementById('refined').innerText=Math.floor(state.refined);
document.getElementById('world').innerText=state.world;
document.getElementById('prestige').innerText=state.prestige;
renderUpgrades();
}

setInterval(()=>{if(state.auto)mineOnce();if(state.superCD>0)state.superCD--;},mineSpeed);

update();
</script>
</body>
</html>
